name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run eval_digest tests
        run: python3 -m pytest scripts/test_eval_digest.py -v

  garden:
    name: Doc sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check projects/ ↔ CLAUDE.md sync
        run: bash scripts/garden_docs.sh
