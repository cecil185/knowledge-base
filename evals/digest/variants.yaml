# Digest Filter Variant Registry
#
# Each variant ties a filter prompt version to a goal.md snapshot.
# The eval runner references these by name in each run report.
#
# Fields:
#   name:        Short identifier used in run report filenames (e.g. "v1")
#   description: One-line summary of what changed in this variant
#   prompt_file: Path to the skill file containing the filter prompt
#   goal_hash:   SHA256 of goal.md at the time this variant was defined
#   created_at:  ISO date
#   notes:       Free-text rationale or A/B conclusion

variants:
  - name: v1
    description: "Baseline — production filter as of 2026-05-10; strict auto-ticket, err toward threshold"
    prompt_file: ".claude/skills/filter-articles/SKILL.md"
    goal_hash: "3a8f2c1d9e4b7a6f0c5d2e8a1f4b9c3e7d0a6b5f2c9e1d4a8b7f3c6e0d2a5b9"
    created_at: "2026-05-10"
    notes: |
      First baseline variant. Uses the current filter-articles SKILL.md verbatim.
      Key characteristics:
      - Three buckets: drop / auto-ticket / threshold
      - No full article fetch; title + snippet + source only
      - High-relevance signals from goal.md drive auto-ticket
      - Strict: false positives cost more than false negatives

  - name: v2
    description: "Tighter auto-ticket — added explicit 'measurably reduces review burden' requirement"
    prompt_file: ".claude/skills/filter-articles/SKILL.md"
    goal_hash: "3a8f2c1d9e4b7a6f0c5d2e8a1f4b9c3e7d0a6b5f2c9e1d4a8b7f3c6e0d2a5b9"
    created_at: "2026-05-17"
    notes: |
      Variant 2 adds an additional auto-ticket gate: the article must show evidence
      of measurably reducing human-review burden (not just describe AI coding in general).
      Hypothesis: this will cut false positives on trend/opinion pieces while keeping
      true positives (case studies, tool releases with concrete benchmarks).
      Compared against v1 in run: 2026-05-17-ab08406-v2.md
      Conclusion: v2 improved precision (+0.08) at a small recall cost (-0.04).
      F1 improved from 0.74 to 0.78. Adopted as new production baseline.
